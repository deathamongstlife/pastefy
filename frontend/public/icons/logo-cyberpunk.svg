<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B00FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F5FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="Orbitron, sans-serif" font-size="60" font-weight="900"
        fill="url(#cyberGrad)" filter="url(#glow)">
    PASTELY
  </text>

  <!-- Decorative elements -->
  <line x1="20" y1="50" x2="80" y2="50" stroke="#00F5FF" stroke-width="2" opacity="0.8"/>
  <line x1="320" y1="50" x2="380" y2="50" stroke="#00F5FF" stroke-width="2" opacity="0.8"/>
  <circle cx="50" cy="50" r="3" fill="#FF006E" filter="url(#glow)"/>
  <circle cx="350" cy="50" r="3" fill="#FF006E" filter="url(#glow)"/>
</svg>
